name: Release

on:
  push:
    tags:
      - "v*"
    branches:
      - master
    paths-ignore:
      - "**.md"
      - ".github/**"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    name: Build artifacts
    runs-on: ubuntu-latest
    container:
      image: goreleaser/goreleaser-cross:v1.25
    steps:
      - name: Install dependencies
        run: |
          apt update && apt install unzip curl -y
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          chmod +x /usr/bin/yq

      - run: git config --global --add safe.directory /__w/nezha/nezha

      - uses: actions/checkout@v4

      - name: Prepare frontends' dists
        run: |
          chmod +x ./script/fetch-frontends.sh && ./script/fetch-frontends.sh

      - name: Fetch IPInfo GeoIP Database
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
        run: |
          rm pkg/geoip/geoip.db
          wget -qO pkg/geoip/geoip.db https://ipinfo.io/data/free/country.mmdb?token=${IPINFO_TOKEN}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: generate swagger docs
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          swag init --pd -d cmd/dashboard -g main.go -o cmd/dashboard/docs
          go mod tidy

      - name: Build with tag
        if: contains(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v6
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --single-target --clean --skip=validate

      - name: Build snapshot
        if: contains(github.ref, 'refs/tags/') == false
        uses: goreleaser/goreleaser-action@v6
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --single-target --clean --skip=validate --snapshot

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ./dist/*/*

  release-docker:
    runs-on: ubuntu-latest
    needs: build
    name: Release Docker images
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./assets

      - name: Fix permissions
        run: |
          chmod -R +x ./assets/*
          mkdir dist
          mv ./assets/*/*/* ./dist

      - name: Log into GHCR
        uses: docker/login-action@master
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate version and image tags
        id: docker-meta
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository_owner }}/nezha" | tr '[:upper:]' '[:lower:]')

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            VERSION="${VERSION#v}"
            TAGS="${IMAGE_NAME}:latest"$'\n'"${IMAGE_NAME}:${VERSION}"
          else
            VERSION="dev-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}-$(echo "${GITHUB_SHA}" | cut -c1-7)"
            TAGS="${IMAGE_NAME}:dev"$'\n'"${IMAGE_NAME}:${VERSION}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${TAGS}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build dashboard image and push
        id: docker-build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ steps.docker-meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

    outputs:
      version: ${{ steps.docker-meta.outputs.version }}
      tags: ${{ steps.docker-meta.outputs.tags }}
      digest: ${{ steps.docker-build.outputs.digest }}

  release:
    runs-on: ubuntu-latest
    needs: release-docker
    name: Create Release
    steps:
      - name: Generate release body
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository_owner }}/nezha" | tr '[:upper:]' '[:lower:]')
          VERSION="${{ needs.release-docker.outputs.version }}"
          DIGEST="${{ needs.release-docker.outputs.digest }}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            FLOATING_TAG="latest"
          else
            FLOATING_TAG="dev"
          fi

          {
            echo "## Docker Images"
            echo ""
            echo "| Tag | Image |"
            echo "|-----|-------|"
            echo "| ${FLOATING_TAG} | \`${IMAGE_NAME}:${FLOATING_TAG}\` |"
            echo "| ${VERSION} | \`${IMAGE_NAME}:${VERSION}\` |"
            echo ""
            echo "**Image Digest:** \`${DIGEST}\`"
            echo ""
            echo "### Pull Commands"
            echo ""
            echo "\`\`\`bash"
            echo "# ${FLOATING_TAG}"
            echo "docker pull ${IMAGE_NAME}:${FLOATING_TAG}"
            echo ""
            echo "# Specific version"
            echo "docker pull ${IMAGE_NAME}:${VERSION}"
            echo ""
            echo "# By digest"
            echo "docker pull ${IMAGE_NAME}@${DIGEST}"
            echo "\`\`\`"
          } > release-body.md

      - name: Determine release tag
        id: release-tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-$(echo "${GITHUB_SHA}" | cut -c1-7)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          prerelease: ${{ steps.release-tag.outputs.prerelease }}
          body_path: release-body.md
          generate_release_notes: true
          append_body: true
